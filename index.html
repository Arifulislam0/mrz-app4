<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional MRZ Generator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        h2 { color: #2c3e50; text-align: center; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; font-size: 14px; }
        input:focus { border-color: #3498db; }
        .output-box { margin-top: 30px; background: #1a1a1a; color: #00ff41; padding: 20px; border-radius: 8px; font-family: 'Courier New', Courier, monospace; letter-spacing: 2px; font-size: 18px; line-height: 1.5; text-align: center; overflow-x: auto; }
        .footer { text-align: center; margin-top: 20px; font-size: 12px; color: #95a5a6; }
    </style>
</head>
<body>

<div class="container">
    <h2>ARIFUL UNIVERSAL MRZ GENERATOR</h2>
    
    <div class="grid">
        <div class="input-group">
            <label>Document Type</label>
            <input type="text" id="docType" value="P" maxlength="1" oninput="updateMRZ()">
        </div>
        <div class="input-group">
            <label>Country Code (e.g. BGD)</label>
            <input type="text" id="country" value="BGD" maxlength="3" oninput="updateMRZ()">
        </div>
        <div class="input-group">
            <label>Surname (নামের শেষ অংশ)</label>
            <input type="text" id="surname" placeholder="e.g. ISLAM" oninput="updateMRZ()">
        </div>
        <div class="input-group">
            <label>Given Names (নামের প্রথম অংশ)</label>
            <input type="text" id="givenNames" placeholder="e.g. ARIFUL" oninput="updateMRZ()">
        </div>
        <div class="input-group">
            <label>Passport Number</label>
            <input type="text" id="passport" placeholder="A12345678" maxlength="9" oninput="updateMRZ()">
        </div>
        <div class="input-group">
            <label>Gender</label>
            <select id="gender" onchange="updateMRZ()">
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="X">Other</option>
            </select>
        </div>
        <div class="input-group">
            <label>Date of Birth (YYMMDD)</label>
            <input type="text" id="dob" placeholder="950101" maxlength="6" oninput="updateMRZ()">
        </div>
        <div class="input-group">
            <label>Expiry Date (YYMMDD)</label>
            <input type="text" id="expiry" placeholder="301231" maxlength="6" oninput="updateMRZ()">
        </div>
        <div class="input-group" style="grid-column: span 2;">
            <label>Personal Number (Optional)</label>
            <input type="text" id="personalNum" placeholder="1234567890" maxlength="14" oninput="updateMRZ()">
        </div>
    </div>

    <div class="output-box" id="mrzOutput">
        P&lt;BGD<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<br>
        <<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<<
    </div>

    <div class="footer">
        Developed By: Ariful | WhatsApp: +8801981071493
    </div>
</div>

<script>
    // ICAO 9303 Check Digit Algorithm
    function getCheckDigit(data) {
        const weights = [7, 3, 1];
        let sum = 0;
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

        for (let i = 0; i < data.length; i++) {
            let char = data[i].toUpperCase();
            let val = chars.indexOf(char);
            if (val === -1) val = 0; // '<' becomes 0
            sum += val * weights[i % 3];
        }
        return sum % 10;
    }

    function pad(str, length) {
        str = str.toUpperCase().replace(/[^A-Z0-9]/g, '<');
        while (str.length < length) str += '<';
        return str.substring(0, length);
    }

    function updateMRZ() {
        const docType = pad(document.getElementById('docType').value || "P", 1);
        const country = pad(document.getElementById('country').value || "BGD", 3);
        const surname = document.getElementById('surname').value.toUpperCase().replace(/\s/g, '<');
        const givenNames = document.getElementById('givenNames').value.toUpperCase().replace(/\s/g, '<');
        const passport = pad(document.getElementById('passport').value, 9);
        const dob = pad(document.getElementById('dob').value, 6);
        const gender = document.getElementById('gender').value;
        const expiry = pad(document.getElementById('expiry').value, 6);
        const personalNum = pad(document.getElementById('personalNum').value, 14);

        // Line 1 Generation
        let nameField = pad(surname + "<<" + givenNames, 39);
        let line1 = docType + "<" + country + nameField;

        // Line 2 Check Digits
        let pCheck = getCheckDigit(passport);
        let dobCheck = getCheckDigit(dob);
        let expiryCheck = getCheckDigit(expiry);
        let personalCheck = getCheckDigit(personalNum);

        // Final Composite Check Digit (Passport + DOB + Expiry + PersonalNum + their checks)
        let compositeString = passport + pCheck + dob + dobCheck + expiry + expiryCheck + personalNum + personalCheck;
        let finalCheck = getCheckDigit(compositeString);

        let line2 = passport + pCheck + country + dob + dobCheck + gender + expiry + expiryCheck + personalNum + personalCheck + finalCheck;

        document.getElementById('mrzOutput').innerHTML = line1 + "<br>" + line2;
    }
</script>

</body>
</html>
