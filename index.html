<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful Universal MRZ Generator</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        h2 { color: #333; text-align: center; margin-bottom: 20px; text-transform: uppercase; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 5px; text-transform: uppercase; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: #007bff; outline: none; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        .output-container { margin-top: 30px; background: #000; padding: 20px; border-radius: 10px; position: relative; }
        .output-box { color: #00ff41; font-family: 'Courier New', Courier, monospace; font-size: 20px; font-weight: bold; letter-spacing: 3px; line-height: 1.6; white-space: pre; overflow-x: auto; text-align: center; }
        .footer { text-align: center; margin-top: 20px; font-size: 13px; color: #777; font-weight: bold; }
        .copy-btn { margin-top: 10px; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ARIFUL UNIVERSAL MRZ GENERATOR</h2>
    
    <div class="grid">
        <div class="input-group">
            <label>Document Type (P for Passport)</label>
            <input type="text" id="docType" value="P" maxlength="1">
        </div>
        <div class="input-group">
            <label>Country Code (e.g., BGD)</label>
            <input type="text" id="country" value="BGD" maxlength="3">
        </div>
        <div class="input-group">
            <label>Surname (নামের শেষ অংশ)</label>
            <input type="text" id="surname" placeholder="ISLAM">
        </div>
        <div class="input-group">
            <label>Given Names (নামের প্রথম অংশ)</label>
            <input type="text" id="givenNames" placeholder="ARIFUL">
        </div>
        <div class="input-group">
            <label>Passport Number</label>
            <input type="text" id="passport" maxlength="9" placeholder="A08614535">
        </div>
        <div class="input-group">
            <label>Gender</label>
            <select id="gender">
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="X">Other</option>
            </select>
        </div>
        <div class="input-group">
            <label>Date of Birth (YYMMDD)</label>
            <input type="text" id="dob" maxlength="6" placeholder="950603">
        </div>
        <div class="input-group">
            <label>Expiry Date (YYMMDD)</label>
            <input type="text" id="expiry" maxlength="6" placeholder="300409">
        </div>
        <div class="input-group" style="grid-column: span 2;">
            <label>Personal Number (Optional)</label>
            <input type="text" id="personalNum" maxlength="14" placeholder="1234567890">
        </div>
    </div>

    <div class="output-container">
        <div class="output-box" id="mrzOutput">আউটপুট এখানে দেখাবে...</div>
    </div>
    
    <button class="copy-btn" onclick="copyResult()">COPY RESULT</button>

    <div class="footer">
        Developed By: Ariful | WhatsApp: +8801981071493
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('input, select');
    inputs.forEach(input => {
        input.addEventListener('input', updateMRZ);
    });

    function getCheckDigit(data) {
        const weights = [7, 3, 1];
        let sum = 0;
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        for (let i = 0; i < data.length; i++) {
            let val = chars.indexOf(data[i].toUpperCase());
            if (val === -1) val = 0;
            sum += val * weights[i % 3];
        }
        return sum % 10;
    }

    function pad(str, length) {
        if (!str) str = "";
        str = str.toUpperCase().replace(/[^A-Z0-9]/g, '<');
        while (str.length < length) str += '<';
        return str.substring(0, length);
    }

    function updateMRZ() {
        const docType = pad(document.getElementById('docType').value || "P", 1);
        const country = pad(document.getElementById('country').value || "BGD", 3);
        const surname = document.getElementById('surname').value.toUpperCase().replace(/[^A-Z0-9]/g, '<');
        const givenNames = document.getElementById('givenNames').value.toUpperCase().replace(/[^A-Z0-9]/g, '<');
        
        const passport = pad(document.getElementById('passport').value, 9);
        const dob = pad(document.getElementById('dob').value, 6);
        const gender = document.getElementById('gender').value;
        const expiry = pad(document.getElementById('expiry').value, 6);
        const personalNum = pad(document.getElementById('personalNum').value, 14);

        // LINE 1: Type(2) + Country(3) + Name(39) = 44
        let nameField = pad(surname + "<<" + givenNames, 39);
        let line1 = (docType + "<" + country + nameField).substring(0, 44);

        // LINE 2: Passport(9)+CD(1) + Country(3) + DOB(6)+CD(1) + Sex(1) + Expiry(6)+CD(1) + Personal(14)+CD(1) + CompositeCD(1) = 44
        let pCheck = getCheckDigit(passport);
        let dobCheck = getCheckDigit(dob);
        let expiryCheck = getCheckDigit(expiry);
        let personalCheck = getCheckDigit(personalNum);

        // Composite Check Digit Calculation
        let compositeSource = passport + pCheck + dob + dobCheck + expiry + expiryCheck + personalNum + personalCheck;
        let finalCheck = getCheckDigit(compositeSource);

        let line2 = passport + pCheck + country + dob + dobCheck + gender + expiry + expiryCheck + personalNum + personalCheck + finalCheck;

        document.getElementById('mrzOutput').innerText = line1 + "\n" + line2;
    }

    function copyResult() {
        const text = document.getElementById('mrzOutput').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("MRZ Copied Successfully!");
        });
    }

    // Initial call
    updateMRZ();
</script>

</body>
</html>
