<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ARIFUL UNIVERSAL MRZ GENERATOR</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        input, select { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        #result { width: 100%; height: 80px; background: #000; color: #00ff00; font-family: 'Courier New', monospace; font-size: 16px; margin-top: 20px; border: none; resize: none; }
        .btn-copy { width: 100%; padding: 15px; background: #28a745; color: white; border: none; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ARIFUL UNIVERSAL MRZ GENERATOR</h2>
    <div class="grid-container">
        <div><label>DOC TYPE</label><select id="docType" oninput="generateMRZ()"><option value="P">P</option><option value="PM">PM</option></select></div>
        <div><label>COUNTRY</label><input type="text" id="country" value="BGD" oninput="generateMRZ()"></div>
        <div><label>PASSPORT NO</label><input type="text" id="passport" oninput="generateMRZ()"></div>
        <div><label>SURNAME</label><input type="text" id="surname" oninput="generateMRZ()"></div>
        <div><label>GIVEN NAMES</label><input type="text" id="givenNames" oninput="generateMRZ()"></div>
        <div><label>GENDER</label><select id="gender" oninput="generateMRZ()"><option value="M">Male</option><option value="F">Female</option></select></div>
        <div><label>DOB (YYMMDD)</label><input type="text" id="dob" oninput="generateMRZ()"></div>
        <div><label>EXPIRY (YYMMDD)</label><input type="text" id="expiry" oninput="generateMRZ()"></div>
        <div><label>PERSONAL ID</label><input type="text" id="personalId" oninput="generateMRZ()"></div>
    </div>
    <textarea id="result" readonly></textarea>
    <button class="btn-copy" onclick="copyResult()">COPY RESULT</button>
</div>

<script>
    // ICAO চেকসাম ক্যালকুলেটর ফাংশন
    function getCheckDigit(str) {
        let weights = [7, 3, 1];
        let sum = 0;
        for (let i = 0; i < str.length; i++) {
            let char = str[i];
            let val = (char === '<') ? 0 : parseInt(char, 36);
            sum += val * weights[i % 3];
        }
        return sum % 10;
    }

    function generateMRZ() {
        const type = document.getElementById('docType').value;
        const country = document.getElementById('country').value.toUpperCase().padEnd(3, '<');
        const pass = document.getElementById('passport').value.toUpperCase();
        const sur = document.getElementById('surname').value.toUpperCase();
        const giv = document.getElementById('givenNames').value.toUpperCase();
        const gen = document.getElementById('gender').value;
        const dob = document.getElementById('dob').value;
        const exp = document.getElementById('expiry').value;
        const pid = document.getElementById('personalId').value.toUpperCase();

        // লাইন ১ তৈরি
        const line1 = (type + "<" + country + sur + "<<" + giv).padEnd(44, '<');
        
        // লাইন ২-এর ক্যালকুলেশন
        const pCheck = getCheckDigit(pass);
        const dCheck = getCheckDigit(dob);
        const eCheck = getCheckDigit(exp);
        
        const line2Base = pass + pCheck + country + dob + dCheck + gen + exp + eCheck + pid;
        const finalLine2 = line2Base.padEnd(43, '<') + getCheckDigit(line2Base);
        
        document.getElementById('result').value = line1 + "\n" + finalLine2;
    }

    function copyResult() {
        document.getElementById("result").select();
        document.execCommand("copy");
        alert("Copied!");
    }
</script>
</body>
</html>
