<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ariful Universal MRZ Generator</title>
    <link href="https://fonts.cdnfonts.com/css/ocr-b" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #e0eafc, #cfdef3); padding: 10px; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .container { width: 95%; max-width: 900px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); border: 2px solid #fff; position: relative; }
        
        h2 { text-align: center; color: #1a73e8; margin: 0 0 5px 0; font-size: 22px; text-transform: uppercase; }
        .service-note { text-align: center; font-size: 13px; color: #d93025; font-weight: bold; background: #fff1f0; padding: 5px; border-radius: 5px; margin-bottom: 15px; }
        
        .input-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        label { display: block; margin-bottom: 3px; font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; }
        
        input, select { width: 100%; padding: 8px; border: 2px solid #dee2e6; border-radius: 6px; box-sizing: border-box; font-size: 13px; transition: 0.3s; background: #fdfdfd; }
        input:focus { outline: none; border-color: #1a73e8; background: #fff; }
        
        /* রঙিন বর্ডার */
        #country { border-left: 4px solid #ffc107; }
        #surname, #givenName { border-left: 4px solid #17a2b8; }
        #passNo { border-left: 4px solid #dc3545; }
        #dob, #expiry { border-left: 4px solid #28a745; }
        #personalNo { border-left: 4px solid #6f42c1; grid-column: span 1; }

        /* রেজাল্ট বক্স - পিক্সেল পারফেক্ট সাইজ */
        .result-section { margin-top: 15px; padding: 10px; background: #f1f3f4; border-radius: 10px; }
        #mrz-output { 
            background: #1e1e1e; 
            color: #00ff41; 
            padding: 15px; 
            font-family: 'OCR-B', monospace; 
            font-size: 18px; 
            text-align: center; 
            letter-spacing: 2px; 
            line-height: 1.4; 
            border-radius: 5px;
            white-space: pre; 
            margin-bottom: 15px;
            box-shadow: inset 0 0 10px #000;
            min-height: 50px;
            display: block;
        }

        .btn-group { display: flex; gap: 10px; width: 100%; }
        button { flex: 1; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.3s; color: white; display: block; }
        .btn-gen { background: #1a73e8; }
        .btn-gen:hover { background: #1557b0; }
        .btn-copy { background: #28a745; }
        .btn-copy:hover { background: #218838; }

        .footer { text-align: center; margin-top: 15px; font-size: 13px; color: #444; border-top: 1px solid #eee; padding-top: 10px; }
        .footer b { color: #1a73e8; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Ariful Universal MRZ Generator</h2>
    <div class="service-note">All types of KYC services available. WhatsApp: +8801981071493</div>
    
    <div class="input-grid">
        <div class="input-group">
            <label>Doc Type</label>
            <select id="docType">
                <option value="P<">P (Standard)</option>
                <option value="PQ">PQ (Ethiopia)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Country Code</label>
            <input type="text" id="country" placeholder="ETH" maxlength="3">
        </div>
        <div class="input-group">
            <label>Passport Number</label>
            <input type="text" id="passNo" placeholder="EQ1827018">
        </div>
        <div class="input-group">
            <label>Surname</label>
            <input type="text" id="surname" placeholder="SHIFERAW">
        </div>
        <div class="input-group">
            <label>Given Names</label>
            <input type="text" id="givenName" placeholder="TSEGAW">
        </div>
        <div class="input-group">
            <label>Gender</label>
            <select id="gender">
                <option value="M">Male (M)</option>
                <option value="F">Female (F)</option>
            </select>
        </div>
        <div class="input-group">
            <label>Date of Birth (YYMMDD)</label>
            <input type="text" id="dob" placeholder="971121">
        </div>
        <div class="input-group">
            <label>Expiry Date (YYMMDD)</label>
            <input type="text" id="expiry" placeholder="300115">
        </div>
        <div class="input-group">
            <label>Personal Number</label>
            <input type="text" id="personalNo" placeholder="<<<<<<<<<<<<<<">
        </div>
    </div>

    <div class="result-section">
        <div id="mrz-output">Output will appear here...</div>
        <div class="btn-group">
            <button class="btn-gen" onclick="generateMRZ()">GENERATE MRZ</button>
            <button class="btn-copy" id="copyBtn" onclick="copyResult()">COPY RESULT</button>
        </div>
    </div>

    <div class="footer">
        Developed By: <b>Ariful</b> | WhatsApp: <b>+8801981071493</b>
    </div>
</div>

<script>
    function generateMRZ() {
        const type = document.getElementById('docType').value;
        const country = (document.getElementById('country').value || "ETH").toUpperCase().padEnd(3, '<');
        const surname = (document.getElementById('surname').value || "").toUpperCase().replace(/\s+/g, '<');
        const givenName = (document.getElementById('givenName').value || "").toUpperCase().replace(/\s+/g, '<');
        const passNo = (document.getElementById('passNo').value || "").toUpperCase().padEnd(9, '<');
        const dob = (document.getElementById('dob').value || "000000");
        const gender = document.getElementById('gender').value;
        const expiry = (document.getElementById('expiry').value || "000000");
        const personal = (document.getElementById('personalNo').value || "").toUpperCase().padEnd(14, '<');

        let line1 = type + country + surname + "<<" + givenName;
        line1 = line1.padEnd(44, '<').substring(0, 44);

        let line2 = passNo + "7" + country + dob + "9" + gender + expiry + "6" + personal + "06";
        line2 = line2.substring(0, 44);

        document.getElementById('mrz-output').innerText = line1 + "\n" + line2;
    }

    function copyResult() {
        const text = document.getElementById('mrz-output').innerText;
        if (text.includes("appear")) return;
        navigator.clipboard.writeText(text);
        
        // বাটন ফিডব্যাক
        const btn = document.getElementById('copyBtn');
        const originalText = btn.innerText;
        btn.innerText = "COPIED!";
        btn.style.background = "#000";
        setTimeout(() => {
            btn.innerText = originalText;
            btn.style.background = "#28a745";
        }, 1500);
    }
</script>

</body>
</html>
