<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIFUL UNIVERSAL MRZ GENERATOR</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2, p { text-align: center; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        #result { width: 100%; padding: 15px; background: #1a1a1a; color: #00ff00; font-family: monospace; font-size: 14px; margin-top: 20px; border: none; white-space: pre; }
        .btn-copy { width: 100%; padding: 15px; background: #28a745; color: white; border: none; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>ARIFUL UNIVERSAL MRZ GENERATOR</h2>
    <p>WhatsApp: +8801981071493</p>

    <select id="docType" onchange="generateMRZ()">
        <option value="P">P</option>
        <option value="PM">PM</option>
    </select>
    
    <input type="text" id="country" placeholder="COUNTRY CODE (e.g., BGD)" oninput="generateMRZ()">
    <input type="text" id="passport" placeholder="PASSPORT NO" oninput="generateMRZ()">
    <input type="text" id="surname" placeholder="SURNAME" oninput="generateMRZ()">
    <input type="text" id="givenNames" placeholder="GIVEN NAMES" oninput="generateMRZ()">
    <select id="gender" onchange="generateMRZ()">
        <option value="M">Male</option>
        <option value="F">Female</option>
    </select>
    <input type="text" id="dob" placeholder="DOB (YYMMDD)" oninput="generateMRZ()">
    <input type="text" id="expiry" placeholder="EXPIRY (YYMMDD)" oninput="generateMRZ()">
    <input type="text" id="personalId" placeholder="PERSONAL ID" oninput="generateMRZ()">

    <textarea id="result" rows="3" readonly></textarea>
    <button class="btn-copy" onclick="copyResult()">COPY RESULT</button>
</div>

<script>
    function generateMRZ() {
        const type = document.getElementById('docType').value;
        const country = document.getElementById('country').value.toUpperCase() || "BGD";
        const surname = document.getElementById('surname').value.toUpperCase() || "SURNAME";
        const given = document.getElementById('givenNames').value.toUpperCase() || "GIVEN";
        const gender = document.getElementById('gender').value;
        
        // MRZ ফরম্যাট অনুযায়ী তৈরি
        const mrzLine1 = ${type}<${country}${surname}<<${given};
        const mrzLine2 = <<<<<<<<<<0${country}<<<<<<0${gender}<<<<<<0<<<<<<<<<<<<<<00;
        
        document.getElementById('result').value = mrzLine1.padEnd(44, '<') + "\n" + mrzLine2.padEnd(44, '<');
    }

    function copyResult() {
        const copyText = document.getElementById("result");
        copyText.select();
        document.execCommand("copy");
        alert("Copied to clipboard!");
    }

    // পেজ লোড হওয়ার সাথে সাথে ডিফল্ট জেনারেশন
    generateMRZ();
</script>

</body>
</html>
